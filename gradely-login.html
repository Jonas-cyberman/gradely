<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradely Admin | Login</title>

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- SUPABASE SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        head {
            display: none !important;
        }

        :root {
            --bg: #f8f9fb;
            --surface: #ffffff;
            --primary: #1e3a5f;
            --secondary: #64748b;
            --accent: #f5a623;
            --border: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 48px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            text-align: left;
        }

        .login-logo-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 32px;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .login-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 8px;
        }

        .login-step {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .login-college {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        .input:focus {
            border-color: var(--primary);
            background: white;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.03);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 24px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            width: 100%;
            gap: 12px;
            font-family: inherit;
            font-size: 1rem;
        }

        .btn-black {
            background: var(--primary);
            color: white;
        }

        .btn-black:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.2);
        }

        .btn-black:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-area {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 20px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="login-logo-box">G</div>
        <h1 class="login-title">GRADELY</h1>
        <p class="login-step">Sign in to your admin dashboard</p>
        <p class="login-college">Dunkwa On Offin Nursing &amp; Midwifery Training College</p>

        <form id="login-form">
            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" id="login-email" class="input" placeholder="jane@example.com" required>
            </div>
            <div class="form-group">
                <label class="label">Password</label>
                <div style="position: relative;">
                    <input type="password" id="login-password" class="input" placeholder="••••••••" required>
                    <button type="button" onclick="togglePass()"
                        style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1.2rem;">👁️</button>
                </div>
            </div>
            <button type="submit" class="btn btn-black" id="login-btn">Sign In</button>
            <p style="text-align:center; margin-top:16px;">
                <a href="#" onclick="forgotPassword()"
                    style="color:#1e3a5f; font-size:0.85rem; font-weight:600; text-decoration:none;">Forgot
                    Password?</a>
            </p>
            <div id="login-error" class="error-area"></div>
        </form>

        <div id="recovery-form" style="display:none;">
            <h2 style="font-size:1.4rem; 
                font-weight:800; 
                margin-bottom:8px; 
                letter-spacing:-0.5px;">
                Set New Password
            </h2>
            <p style="color:#94a3b8; 
                font-size:0.9rem; 
                margin-bottom:32px;">
                Choose a strong password for your 
                Gradely Admin account.
            </p>
            
            <div class="form-group">
                <label class="label">New Password</label>
                <div style="position:relative;">
                    <input type="password" 
                        id="recovery-password" 
                        class="input" 
                        placeholder="Minimum 8 characters"
                        oninput="checkRecoveryStrength(
                            this.value)">
                    <button type="button" 
                        onclick="toggleRecoveryPass()"
                        style="position:absolute; 
                            right:12px; top:50%; 
                            transform:translateY(-50%); 
                            background:none; border:none; 
                            cursor:pointer; font-size:1.2rem;">
                        👁️
                    </button>
                </div>
                <div id="recovery-strength-bar" 
                    style="height:4px; width:0; 
                        background:#f5a623; 
                        margin-top:8px; 
                        border-radius:2px; 
                        transition:0.3s;">
                </div>
                <div id="recovery-strength-text"
                    style="font-size:0.75rem; 
                        color:#94a3b8; 
                        margin-top:6px;">
                </div>
            </div>
            
            <div class="form-group">
                <label class="label">
                    Confirm New Password
                </label>
                <input type="password" 
                    id="recovery-confirm" 
                    class="input" 
                    placeholder="Re-type new password">
            </div>
            
            <button onclick="confirmRecoveryPassword()" 
                class="btn btn-black" 
                id="recovery-btn">
                Update Password
            </button>
            
            <div id="recovery-error" 
                class="error-area">
            </div>
        </div>
    </div>

    <script>
        // ─── SUPABASE INITIALIZATION ───
        const { createClient } = supabase;
        const db = createClient(
            'https://jklpeyertjndhqvndnct.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprbHBleWVydGpuZGhxdm5kbmN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MzM4MzEsImV4cCI6MjA4ODIwOTgzMX0.JbCzLTbeQpRwBJCYEOWqN5eZwktUrlyvNg7USZQR_dM'
        );

        // ─── AUTHENTICATION ───
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('login-btn');
            const errorArea = document.getElementById('login-error');

            btn.disabled = true;
            btn.textContent = 'Verifying...';
            errorArea.style.display = 'none';

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;
                await checkAdminUser(data.user.id);
            } catch (err) {
                errorArea.textContent = "Invalid email or password. Try again.";
                errorArea.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });

        async function checkAdminUser(userId) {
            const { data: admin, error } = await db
                .from('admin_users')
                .select('*')
                .eq('id', userId)
                .single();

            // Check if there is a pending invite for this user's email
            const { data: { user: currentUser } } = await db.auth.getUser();
            const email = currentUser?.email;
            if (email) {
                const pendingKey = 'pending_admin_' + email.replace(/[^a-z0-9]/gi, '_');
                const { data: pendingSetting } = await db
                    .from('app_settings')
                    .select('*')
                    .eq('key', pendingKey)
                    .single();
                
                if (pendingSetting) {
                    const pending = JSON.parse(pendingSetting.value);
                    // Auto-create admin record
                    await db.from('admin_users').insert({
                        id: userId,
                        name: pending.name,
                        role: pending.role,
                        position: pending.position,
                        email: pending.email,
                        is_active: true
                    });
                    // Clean up pending invite
                    await db.from('app_settings')
                        .delete()
                        .eq('key', pendingKey);
                    // Redirect to dashboard
                    window.location.href = 'gradely-admin.html';
                    return;
                }
            }

            if (!admin || !admin.is_active) {
                await db.auth.signOut();
                const errorArea = document.getElementById('login-error');
                errorArea.textContent = admin ? 'Access denied. Account is suspended.' : 'Access denied. Contact Jonas Coleman for admin access.';
                errorArea.style.display = 'block';
                document.getElementById('login-btn').disabled = false;
                document.getElementById('login-btn').textContent = 'Sign In';
                return;
            }

            // Redirect to Dashboard
            window.location.href = 'gradely-admin.html';
        }

        function checkForRecoveryToken() {
            const hash = window.location.hash;
            if (!hash) return false;
            
            // Parse the hash fragment
            const params = {};
            hash.substring(1).split('&').forEach(part => {
                const [key, val] = part.split('=');
                params[key] = decodeURIComponent(val || '');
            });
            
            if (params.type === 'recovery' && params.access_token) {
                // Set the session from the recovery token
                // Supabase auto-detects hash tokens on load
                // Just show the recovery form
                showRecoveryForm();
                return true;
            }
            return false;
        }

        function showRecoveryForm() {
            document.getElementById('login-form').style.display = 'none';
            document.querySelector('.login-step').style.display = 'none';
            document.getElementById('recovery-form').style.display = 'block';
        }

        function toggleRecoveryPass() {
            const input = document.getElementById('recovery-password');
            const confirmInput = document.getElementById('recovery-confirm');
            const type = input.type === 'password' ? 'text' : 'password';
            input.type = type;
            confirmInput.type = type;
        }

        function checkRecoveryStrength(pass) {
            const bar = document.getElementById('recovery-strength-bar');
            const text = document.getElementById('recovery-strength-text');
            
            if (!pass) {
                bar.style.width = '0';
                text.textContent = '';
                return;
            }
            
            let score = 0;
            if (pass.length >= 8) score++;
            if (/[A-Z]/.test(pass)) score++;
            if (/[0-9]/.test(pass)) score++;
            if (/[^a-zA-Z0-9]/.test(pass)) score++;
            
            if (score <= 1) {
                bar.style.width = '33%';
                bar.style.background = '#ef4444';
                text.textContent = 'Weak';
                text.style.color = '#ef4444';
            } else if (score === 2 || score === 3) {
                bar.style.width = '66%';
                bar.style.background = '#f5a623';
                text.textContent = 'Good';
                text.style.color = '#f5a623';
            } else {
                bar.style.width = '100%';
                bar.style.background = '#22c55e';
                text.textContent = 'Strong';
                text.style.color = '#22c55e';
            }
        }

        async function confirmRecoveryPassword() {
            const pass = document.getElementById('recovery-password').value;
            const confirm = document.getElementById('recovery-confirm').value;
            const btn = document.getElementById('recovery-btn');
            const errorArea = document.getElementById('recovery-error');
            
            errorArea.style.display = 'none';
            
            if (pass.length < 8) {
                errorArea.textContent = "Password must be at least 8 characters.";
                errorArea.style.display = 'block';
                return;
            }
            
            if (pass !== confirm) {
                errorArea.textContent = "Passwords do not match.";
                errorArea.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Updating...';
            
            try {
                const { error } = await db.auth.updateUser({
                    password: pass
                });
                
                if (error) throw error;
                
                // Show success and redirect
                document.getElementById('recovery-form').innerHTML = `
                    <div style="text-align:center; padding:20px 0;">
                        <div style="font-size:3rem; margin-bottom:16px;">✅</div>
                        <h3 style="font-size:1.2rem; margin-bottom:8px;">Password Updated!</h3>
                        <p style="color:#64748b; font-size:0.9rem;">Redirecting to login...</p>
                    </div>
                `;
                
                setTimeout(() => {
                    window.location.hash = '';
                    window.location.reload();
                }, 2000);
                
            } catch (err) {
                errorArea.textContent = "Error updating password: " + err.message;
                errorArea.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Update Password';
            }
        }

        async function initAuth() {
            if (checkForRecoveryToken()) return;
            
            const { data: { session } } = await db.auth.getSession();
            if (session) {
                await checkAdminUser(session.user.id);
            }
        }

        function togglePass() {
            const input = document.getElementById('login-password');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function forgotPassword() {
            const email = document.getElementById('login-email').value;
            if (!email) {
                alert('Enter your email address first then click Forgot Password.');
                return;
            }
            const { error } = await db.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/gradely-admin.html'
            });
            if (!error) {
                alert('Password reset email sent to ' + email + '. Check your inbox.');
            } else {
                alert('Could not send reset email. Check the address and try again.');
            }
        }

        initAuth();
    </script>
</body>

</html>
